<div
  class="feature"
  {% if include.flip %}
    data-flip
  {% endif %}
>
  <a
    {% if include.link %}
      href="{{ include.link | relative_url | uri_escape }}"
    {% endif %}
    class="feature-image{% if include.images %} feature-image-collage{% endif %}"
    aria-label="{{ include.title | default: "feature link" | regex_strip }}"
  >
    {% assign feature_images = include.images | default: include.image | image_list %}
    {% if feature_images.size > 1 %}
      <div class="feature-collage" aria-hidden="true">
        {% for image in feature_images %}
          <div class="feature-collage-tile">
            <img
              src="{{ image | relative_url | uri_escape }}"
              loading="lazy"
              alt=""
              {% include fallback.html %}
            >
          </div>
        {% endfor %}
      </div>
    {% else %}
      <img
        src="{{ feature_images.first | relative_url | uri_escape }}"
        loading="lazy"
        alt="{{ include.title | default: "feature image" | regex_strip }}"
        {% include fallback.html %}
      >
    {% endif %}
  </a>
  <div class="feature-text">
    {% if include.title %}
      <p class="feature-title">{{ include.title }}</p>
    {% endif %}
    {{ include.text | markdownify }}
  </div>
</div>

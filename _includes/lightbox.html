<dialog class="lightbox" aria-label="Image preview">
  <button class="lightbox-close" type="button" data-lightbox-close aria-label="Close image preview">
    ×
  </button>
  <figure class="lightbox-frame">
    <img class="lightbox-image" data-lightbox-image alt="" loading="eager">
    <figcaption class="lightbox-caption" data-lightbox-caption></figcaption>
  </figure>
</dialog>

  - type: paper
    link: https://doi.org/10.48550/arXiv.2411.03951
  abstract: Accurate, efficient, and robust state estimation is more important than
    ever in robotics as the variety of platforms and complexity of tasks continue
    to grow. Historically, discrete-time filters and smoothers have been the dominant
    approach, in which the estimated variables are states at discrete sample times.
    The paradigm of continuous-time state estimation proposes an alternative strategy
    by estimating variables that express the state as a continuous function of time,
    which can be evaluated at any query time. Not only can this benefit downstream
    tasks such as planning and control, but it also significantly increases estimator
    performance and flexibility, as well as reduces sensor preprocessing and interfacing
    complexity. Despite this, continuous-time methods remain underutilized, potentially
    because they are less well-known within robotics. To remedy this, this work presents
    a unifying formulation of these methods and the most exhaustive literature review
    to date, systematically categorizing prior work by methodology, application, state
    variables, historical context, and theoretical contribution to the field. By surveying
    splines and Gaussian processes together and contextualizing works from other research
    domains, this work identifies and analyzes open problems in continuous-time state
    estimation and suggests new research directions.

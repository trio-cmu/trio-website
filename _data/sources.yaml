  title: 'Continuous-Time State Estimation Methods in Robotics: A Survey'
  authors:
  - William Talbot
  - Julian Nubert
  - Turcan Tuna
  - Cesar Cadena
  - "Frederike D\xFCmbgen"
  - Jesus Tordesillas
  - Timothy D. Barfoot

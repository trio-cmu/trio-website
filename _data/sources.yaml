  title: Can Tabular Foundation Models Guide Exploration in Robot Policy Learning?
  authors:
  - Buqing Ou
  - "Frederike D\xFCmbgen"
  date: '2026-01-01'
  buttons:
  - type: paper
    link: https://doi.org/10.48550/arXiv.2604.27667
  abstract: Policy optimization in high-dimensional continuous control for robotics
    remains a challenging problem. Predominant methods are inherently local and often
    require extensive tuning and carefully chosen initial guesses for good performance,
    whereas more global and less initialization-sensitive search methods typically
    incur high rollout costs. We propose TFM-S3, a tabular hybrid local-global method
    for improving global exploration in robot policy learning with limited rollout
    cost. We interleave high-frequency local updates with intermittent rounds of global
    search. In each search round, we construct a dynamically updated low-dimensional
    policy subspace via SVD and perform iterative surrogate-guided refinement within
    this space. A pretrained tabular foundation model predicts candidate returns from
    a small context set, enabling large-scale screening with limited rollout cost.
    Experiments on continuous control benchmarks show that TFM-S3 consistently accelerates
    early-stage convergence and improves final performance compared to TD3 and population-based
    baselines under an identical rollout budget. These results demonstrate that foundation
    models are a powerful new tool for creating sample-efficient policy learning methods
    for continuous control in robotics.
